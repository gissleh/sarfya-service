    - id: Zkdam3LPQs235hRyOPrRjg
      text: |-
        A. 1Polpxaya 2taronyu 3(kelku si) 4(tsatsray)5(mì)?
        B. 6Pum 7amevol.
      translations:
        en: '{(Now pum is an all-purpose pronominalizer that can be used for inanimates, animates, and even people--any repeated noun. So this is perfectly possible. However, it''s more elegant to use a more specialized term when possible, one that represents the class of the object(s) under discussion. In the case of taronyu, the class is simply tute.)}'
