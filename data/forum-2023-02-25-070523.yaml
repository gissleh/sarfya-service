    - id: C7K1hbobTW-p3XWpDO6VCQ
      text: 1Oel 2new 3(futa|fta) 4fo 5kivä, 6slä 7sa'nokìl 8{(new)} 9(tsata|tsta) 10{(fo)} 11'ivì'awn.
      lookup_filter:
        4: 412:pn.:noaffix:nolen
        9: 5436:sbd.:noaffix:nolen
        10: 412:pn.:noaffix:nolen
      translations:
        en: |-
            1I 2want 4them 3+5(to go), 6but 7mother 8wants 10them 9+11(to stay).
            {Although the standard choice is futa, tsata is possible and actually preferred in contrasting situations such as this, where it sets off the contrast (this vs. that}{ and also serves to avoid the repetition of futa.)}
